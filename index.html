<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.5" />
  <title>Player with Channels, Folders & Firebase</title>
  
  <!-- استدعاء مكتبات Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    
    /* المشغل الأساسي */
    iframe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; z-index: 1; }
    
    /* زرار الشاشة الكاملة */
    #fs-btn {
      position: fixed; top: 14px; left: 14px; z-index: 2147483647;
      background: #e50914; border: none; border-radius: 8px;
      color: #fff; cursor: pointer; padding: 10px 16px;
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.7);
      transition: background .15s, transform .1s;
    }
    #fs-btn:hover { background: #ff1a1a; transform: scale(1.05); }
    #fs-btn:active { transform: scale(0.97); }
    #fs-btn svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }

    /* زرار إغلاق المشغل (X) */
    #close-player-btn {
      position: fixed; top: 14px; left: 72px; z-index: 2147483647;
      background: #333; border: 1px solid #555; border-radius: 8px;
      color: #ff4c4c; cursor: pointer; padding: 10px 14px;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 2px 12px rgba(0,0,0,0.7);
      transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    #close-player-btn:hover { background: #ff4c4c; color: #fff; border-color: #ff4c4c; transform: scale(1.05); }

    /* زرار فتح القائمة الجانبية (أيقونة فقط) */
    #menu-btn {
      position: fixed; top: 14px; right: 14px; z-index: 2147483647;
      background: #333; border: 1px solid #555; border-radius: 8px;
      color: #fff; cursor: pointer; padding: 10px 14px;
      font-size: 18px; font-weight: 700;
      box-shadow: 0 2px 12px rgba(0,0,0,0.7);
      transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    #menu-btn:hover { background: #444; transform: scale(1.05); }

    /* القائمة الجانبية (Sidebar) */
    #sidebar {
      position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
      background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px);
      border-left: 1px solid #333; z-index: 2147483648;
      transition: right 0.3s ease-in-out; color: #fff;
      display: flex; flex-direction: column;
    }
    #sidebar.open { right: 0; }
    
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid #333;
      display: flex; justify-content: space-between; align-items: center;
    }
    .close-btn { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
    .close-btn:hover { color: #fff; }

    .action-buttons { padding: 15px; display: flex; gap: 8px; border-bottom: 1px solid #333; flex-wrap: wrap; }
    .action-btn {
      flex: 1 1 calc(33% - 8px); min-width: 70px; padding: 8px 5px; background: #222; border: 1px solid #444;
      color: #fff; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-align: center;
    }
    .action-btn:hover { background: #e50914; border-color: #e50914; }

    /* قائمة القنوات والمجلدات */
    #content-list { flex: 1; overflow-y: auto; padding: 15px; }
    
    .folder { margin-bottom: 15px; background: #1a1a1a; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
    .folder-header { 
      padding: 12px; background: #252525; cursor: pointer; font-weight: bold; 
      display: flex; justify-content: space-between; align-items: center; position: relative;
    }
    .folder-header:hover { background: #333; }
    .folder-channels { padding: 5px 0; display: none; }
    .folder.open .folder-channels { display: block; }
    
    .channel-item {
      padding: 10px 15px; cursor: pointer; font-size: 14px;
      border-bottom: 1px solid #222; transition: background 0.2s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      position: relative;
    }
    .channel-item:last-child { border-bottom: none; }
    .channel-item:hover { background: #333; color: #e50914; }
    .channel-item.active { border-right: 4px solid #e50914; background: #2a0000; }
    
    /* أزرار التعديل والحذف */
    .item-actions {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      display: none; gap: 10px;
    }
    .channel-item:hover .item-actions, .folder-header:hover .item-actions { display: flex; }
    .action-icon-btn { 
      background: transparent; border: none; cursor: pointer; font-size: 12px; font-weight: bold; padding: 2px 4px;
    }
    .action-icon-btn.delete-btn { color: #ff4c4c; }
    .action-icon-btn.edit-btn { color: #4caf50; }
    .action-icon-btn.delete-btn:hover { text-decoration: underline; }
    .action-icon-btn.edit-btn:hover { text-decoration: underline; }

    /* زرار الإضافة أسفل القائمة */
    .add-plus-btn {
      text-align: center; font-size: 24px; font-weight: bold; color: #fff; background: #222;
      margin-top: 10px; border-radius: 6px; border: 1px dashed #444; padding: 10px;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .add-plus-btn:hover { background: #333; border-color: #e50914; color: #e50914; }

    /* فورم الإضافة المنبثق */
    #add-modal {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2147483649; justify-content: center; align-items: center;
    }
    .modal-content { background: #222; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; border: 1px solid #444; }
    .modal-content h3 { margin-bottom: 15px; font-size: 16px; color: #fff; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 10px; margin-bottom: 15px; background: #111;
      border: 1px solid #444; color: #fff; border-radius: 4px;
    }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .save-btn { background: #e50914; color: #fff; }
    .cancel-btn { background: #555; color: #fff; }
  </style>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="./manifest.json?v=v1782108570307">
    <meta name="theme-color" content="#e151d2">
    <link rel="apple-touch-icon" href="./icon-192.png?v=v1782108570307">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=v1782108570307')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Failed', err));
        });
      }
    </script>
</head>
<body>
  
  <!-- زرار القائمة (أيقونة فقط) -->
  <button id="menu-btn">☰</button>

  <!-- المشغل -->
  <iframe
    id="player"
    src="https://href.li/?https://17.livekoora.blog/albaplayer/live1/"
    width="100%" height="100%" frameborder="0" allowfullscreen
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
    sandbox="allow-same-origin allow-scripts allow-forms allow-orientation-lock allow-pointer-lock allow-presentation allow-top-navigation-by-user-activation allow-modals allow-storage-access-by-user-activation">
  </iframe>

  <!-- زرار الشاشة الكاملة -->
  <button id="fs-btn" title="Fullscreen">
    <svg id="fs-icon-enter" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
    </svg>
    <svg id="fs-icon-exit" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
    </svg>
  </button>

  <!-- زرار إغلاق المشغل -->
  <button id="close-player-btn" title="إغلاق المشغل والعودة للرئيسية">✖</button>

  <!-- القائمة الجانبية -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>قائمتي</h2>
      <button class="close-btn" id="close-sidebar">×</button>
    </div>
    
    <div class="action-buttons">
      <button class="action-btn" id="btn-add-folder">+ إضافة مجلد</button>
      <button class="action-btn" id="btn-add-external">🌐 صفحة خارجية</button>
      <button class="action-btn" id="btn-import-m3u">⬇️ استيراد m3u</button>
      <button class="action-btn" id="btn-export-m3u">⬆️ تصدير m3u</button>
      <button class="action-btn" id="btn-save-file">💾 حفظ الصفحة</button>
    </div>
    <input type="file" id="file-import" accept=".m3u,.m3u8" style="display:none;">

    <div id="content-list">
      <!-- هيتم حقن القنوات والمجلدات وزرار الإضافة هنا عن طريق الجافاسكريبت -->
    </div>
  </div>

  <!-- فورم الإضافة المنبثق (Modal) -->
  <div id="add-modal">
    <div class="modal-content">
      <h3 id="modal-title">إضافة</h3>
      <input type="text" id="input-name" placeholder="الاسم (مثال: بين سبورت 1)" autocomplete="off">
      <input type="text" id="input-url" placeholder="الرابط" autocomplete="off" style="display:none;">
      <select id="select-folder" style="display:none;">
        <option value="none">-- بدون مجلد (حرة) --</option>
      </select>
      <div class="modal-buttons">
        <button class="save-btn" id="modal-save">حفظ</button>
        <button class="cancel-btn" id="modal-cancel">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    // 1. سكريبت الحماية ومنع النوافذ المنبثقة (زي ما هو بالظبط)
    (function () {
      function _noop() {}
      try { Object.defineProperty(window, "open", {value: _noop, writable: false, configurable: false}); } catch (e) { window.open = _noop; }
      var windowCount = window.length;
      setInterval(function () {
        if (window.length > windowCount) {
          for (var i = windowCount; i < window.length; i++) { try { window[i].close(); } catch (e) {} }
        }
        windowCount = window.length;
      }, 100);
      var _origST = window.setTimeout; var _origSI = window.setInterval;
      window.setTimeout = function (fn, delay) { if (typeof fn === "string" && fn.indexOf("window.open") !== -1) return null; return _origST.apply(this, arguments); };
      window.setInterval = function (fn, delay) { if (typeof fn === "string" && fn.indexOf("window.open") !== -1) return null; return _origSI.apply(this, arguments); };
      window.addEventListener("message", function (e) { if (e.data && typeof e.data === "string" && e.data.indexOf("http") === 0) { e.stopImmediatePropagation(); } }, true);
    }());

    // 2. سكريبت الشاشة الكاملة (زي ما هو)
    (function () {
      var btn = document.getElementById('fs-btn');
      var enter = document.getElementById('fs-icon-enter');
      var exit = document.getElementById('fs-icon-exit');
      var root = document.documentElement;

      function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement); }
      function updateBtn() {
        var fs = isFullscreen();
        enter.style.display = fs ? 'none' : 'block';
        exit.style.display = fs ? 'block' : 'none';
      }
      btn.addEventListener('click', function (e) {
        e.stopPropagation(); e.preventDefault();
        if (!isFullscreen()) {
          var targets = [root, document.body];
          for (var i = 0; i < targets.length; i++) {
            var req = targets[i].requestFullscreen || targets[i].webkitRequestFullscreen || targets[i].mozRequestFullScreen;
            if (req) { try { req.call(targets[i]); } catch(err) {} break; }
          }
        } else {
          var ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
          if (ex) try { ex.call(document); } catch(err) {}
        }
      });
      document.addEventListener('fullscreenchange', updateBtn);
      document.addEventListener('webkitfullscreenchange', updateBtn);
    })();

    // 3. نظام القنوات، المجلدات، التعديل، الحذف، الاستيراد، والتصدير + Firebase
    (function() {
      // إعداد الفايربيس
      const firebaseConfig = {
        apiKey: "AIzaSyBtIkF-UhkeFa-cxutgJAQpR7K_IjKxloc",
        authDomain: "spygame-337ee.firebaseapp.com",
        databaseURL: "https://spygame-337ee-default-rtdb.firebaseio.com", 
        projectId: "spygame-337ee",
        storageBucket: "spygame-337ee.firebasestorage.app"
      };
      
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const database = firebase.database();

      // إعداد البيانات الافتراضية مع جعل المجلد مقفول افتراضياً (isOpen: false)
      let defaultData = {
        folders: [{ id: 'f1', name: 'قنوات رياضية', isOpen: false }],
        channels: [{ id: 'c1', name: 'القناة الأساسية (تجربة)', url: 'https://href.li/?https://17.livekoora.blog/albaplayer/live1/', folderId: 'none', isExternal: false }]
      };
      
      let db = JSON.parse(localStorage.getItem('myPlayerDB')) || defaultData;

      // التأكد إن كل الفولدرات مقفولة أول ما الصفحة تفتح من التخزين المحلي
      if (db.folders) {
        db.folders.forEach(f => f.isOpen = false);
      }

      // سحب البيانات من الفايربيس عند تشغيل الصفحة
      database.ref('myPlayerDB').once('value').then((snapshot) => {
        if (snapshot.exists()) {
          db = snapshot.val();
          if(!db.folders) db.folders = [];
          if(!db.channels) db.channels = [];
          
          // التأكد إن كل الفولدرات اللي راجعة من السيرفر مقفولة افتراضياً
          db.folders.forEach(f => f.isOpen = false);
          
          localStorage.setItem('myPlayerDB', JSON.stringify(db));
          renderList();
        }
      });
      
      const sidebar = document.getElementById('sidebar');
      const menuBtn = document.getElementById('menu-btn');
      const closeBtn = document.getElementById('close-sidebar');
      const contentList = document.getElementById('content-list');
      const player = document.getElementById('player');
      
      const modal = document.getElementById('add-modal');
      const inputName = document.getElementById('input-name');
      const inputUrl = document.getElementById('input-url');
      const selectFolder = document.getElementById('select-folder');
      let currentAction = ''; 
      let currentEditId = null; 

      // تفعيل زرار إغلاق المشغل والعودة لصفحة الـ index.html عشان ميرميكش للـ Root
      document.getElementById('close-player-btn').addEventListener('click', function() {
        window.location.href = 'index.html'; 
      });

      // دالة الحفظ (بتحفظ محلي وفي الفايربيس)
      function saveDB() { 
        localStorage.setItem('myPlayerDB', JSON.stringify(db)); 
        database.ref('myPlayerDB').set(db);
      }

      menuBtn.addEventListener('click', () => sidebar.classList.add('open'));
      closeBtn.addEventListener('click', () => sidebar.classList.remove('open'));

      function renderList() {
        contentList.innerHTML = ''; 
        
        // عرض المجلدات
        db.folders.forEach(folder => {
          const folderDiv = document.createElement('div');
          folderDiv.className = `folder ${folder.isOpen ? 'open' : ''}`;
          
          const folderHeader = document.createElement('div');
          folderHeader.className = 'folder-header';
          folderHeader.innerHTML = `
            <span>📁 ${folder.name}</span> 
            <div class="item-actions">
              <button class="action-icon-btn edit-btn" onclick="editItem('folder', '${folder.id}', event)">تعديل</button>
              <button class="action-icon-btn delete-btn" onclick="deleteItem('folder', '${folder.id}', event)">حذف</button>
            </div>`;
          folderHeader.onclick = (e) => {
            if(e.target.tagName !== 'BUTTON') {
              folder.isOpen = !folder.isOpen;
              saveDB(); renderList();
            }
          };

          const channelsContainer = document.createElement('div');
          channelsContainer.className = 'folder-channels';
          
          let folderHasChannels = false;
          db.channels.filter(c => c.folderId === folder.id).forEach(channel => {
            folderHasChannels = true;
            channelsContainer.appendChild(createChannelElement(channel));
          });
          
          if(!folderHasChannels) {
            channelsContainer.innerHTML = '<div style="padding: 10px 15px; color: #777; font-size: 12px;">فارغ..</div>';
          }

          folderDiv.appendChild(folderHeader);
          folderDiv.appendChild(channelsContainer);
          contentList.appendChild(folderDiv);
        });

        // عرض القنوات الحرة والصفحات الخارجية
        db.channels.filter(c => c.folderId === 'none').forEach(channel => {
          contentList.appendChild(createChannelElement(channel));
        });
        
        // زرار (+) لإضافة قناة أسفل القائمة
        const addChannelBtn = document.createElement('div');
        addChannelBtn.className = 'add-plus-btn';
        addChannelBtn.innerHTML = '+';
        addChannelBtn.title = 'إضافة قناة جديدة';
        addChannelBtn.onclick = () => openModal('channel');
        contentList.appendChild(addChannelBtn);

        updateFolderSelectOptions();
      }

      function createChannelElement(channel) {
        const div = document.createElement('div');
        div.className = 'channel-item';
        if(!channel.isExternal && player.src === channel.url && player.src !== '') div.classList.add('active');
        
        const icon = channel.isExternal ? '🌐' : '📺';
        div.innerHTML = `
          ${icon} ${channel.name} 
          <div class="item-actions">
            <button class="action-icon-btn edit-btn" onclick="editItem('channel', '${channel.id}', event)">تعديل</button>
            <button class="action-icon-btn delete-btn" onclick="deleteItem('channel', '${channel.id}', event)">حذف</button>
          </div>`;
        
        div.onclick = (e) => {
          if(e.target.tagName !== 'BUTTON') {
            if(channel.isExternal) {
              // فتح الرابط في صفحتين (2 Tabs)
              const a1 = document.createElement('a'); a1.href = channel.url; a1.target = '_blank';
              document.body.appendChild(a1); a1.click(); document.body.removeChild(a1);
              
              const a2 = document.createElement('a'); a2.href = channel.url; a2.target = '_blank';
              document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
            } else {
              // تشغيل في المشغل الداخلي
              player.src = channel.url; 
              renderList(); 
              if(window.innerWidth < 768) sidebar.classList.remove('open'); 
            }
          }
        };
        return div;
      }

      // دالة الحذف
      window.deleteItem = function(type, id, event) {
        event.stopPropagation();
        
        if(type === 'folder') {
          if(!confirm('متأكد إنك عايز تحذف المجلد ده؟')) return;
          if(confirm('عايز تحذف كل القنوات اللي جوه المجلد ده كمان؟ \n(دوس "إلغاء / Cancel" لو عايز تحافظ على القنوات وتطلعهم بره المجلد بس)')) {
             db.channels = db.channels.filter(c => c.folderId !== id);
          } else {
             db.channels.forEach(c => { if(c.folderId === id) c.folderId = 'none'; });
          }
          db.folders = db.folders.filter(f => f.id !== id);
        } else {
          if(!confirm('متأكد إنك عايز تحذف القناة دي؟')) return;
          db.channels = db.channels.filter(c => c.id !== id);
        }
        saveDB(); renderList();
      };

      // دالة التعديل
      window.editItem = function(type, id, event) {
        event.stopPropagation();
        currentEditId = id;
        
        if(type === 'folder') {
            const folder = db.folders.find(f => f.id === id);
            if(folder) {
                inputName.value = folder.name;
                openModal('folder', true);
            }
        } else {
            const channel = db.channels.find(c => c.id === id);
            if(channel) {
                inputName.value = channel.name;
                inputUrl.value = channel.url;
                selectFolder.value = channel.folderId;
                openModal(channel.isExternal ? 'external' : 'channel', true);
            }
        }
      };

      // دالة فتح الفورم
      function openModal(action, isEdit = false) {
        currentAction = action;
        
        if(!isEdit) {
            currentEditId = null;
            inputName.value = ''; 
            inputUrl.value = ''; 
            selectFolder.value = 'none';
        }
        
        const titlePrefix = isEdit ? 'تعديل' : 'إضافة';
        
        if(action === 'folder') {
          document.getElementById('modal-title').innerText = titlePrefix + ' مجلد';
          inputUrl.style.display = 'none'; selectFolder.style.display = 'none';
        } else if (action === 'external') {
          document.getElementById('modal-title').innerText = titlePrefix + ' صفحة خارجية (تفتح مرتين)';
          inputUrl.style.display = 'block'; selectFolder.style.display = 'block';
        } else {
          document.getElementById('modal-title').innerText = titlePrefix + ' قناة';
          inputUrl.style.display = 'block'; selectFolder.style.display = 'block';
        }
        modal.style.display = 'flex';
      }

      function closeModal() { modal.style.display = 'none'; }

      function updateFolderSelectOptions() {
        selectFolder.innerHTML = '<option value="none">-- بدون مجلد (حرة) --</option>';
        db.folders.forEach(f => {
          selectFolder.innerHTML += `<option value="${f.id}">${f.name}</option>`;
        });
      }

      document.getElementById('btn-add-folder').onclick = () => openModal('folder');
      document.getElementById('btn-add-external').onclick = () => openModal('external');
      document.getElementById('modal-cancel').onclick = closeModal;

      // دالة الحفظ
      document.getElementById('modal-save').onclick = () => {
        const name = inputName.value.trim();
        if(!name) return alert('لازم تكتب الاسم');

        if (currentEditId) {
            if (currentAction === 'folder') {
                const f = db.folders.find(fol => fol.id === currentEditId);
                if(f) f.name = name;
            } else {
                const url = inputUrl.value.trim();
                if(!url) return alert('لازم تحط الرابط');
                const c = db.channels.find(ch => ch.id === currentEditId);
                if(c) {
                    c.name = name;
                    c.url = url;
                    c.folderId = selectFolder.value;
                    c.isExternal = (currentAction === 'external');
                }
            }
        } else {
            const newId = '_' + Math.random().toString(36).substr(2, 9); 
            if(currentAction === 'folder') {
              db.folders.push({ id: newId, name: name, isOpen: false }); // المجلد الجديد مقفول افتراضياً
            } else {
              const url = inputUrl.value.trim();
              if(!url) return alert('لازم تحط الرابط');
              
              const isExt = (currentAction === 'external');
              db.channels.push({ id: newId, name: name, url: url, folderId: selectFolder.value, isExternal: isExt });
            }
        }

        saveDB(); renderList(); closeModal();
      };

      // === كود تصدير M3U ===
      document.getElementById('btn-export-m3u').onclick = () => {
        let m3u = "#EXTM3U\n";
        db.channels.forEach(c => {
          let groupStr = '';
          if(c.folderId !== 'none') {
            const f = db.folders.find(fol => fol.id === c.folderId);
            if(f) groupStr = ` group-title="${f.name}"`;
          }
          m3u += `#EXTINF:-1${groupStr},${c.name}\n${c.url}\n`;
        });
        const blob = new Blob([m3u], { type: 'application/vnd.apple.mpegurl' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'my_channels.m3u8';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // === كود استيراد M3U ===
      document.getElementById('btn-import-m3u').onclick = () => document.getElementById('file-import').click();
      document.getElementById('file-import').onchange = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          const contents = e.target.result;
          const lines = contents.split('\n');
          
          const defaultFolderName = file.name.replace('.m3u8', '').replace('.m3u', '') || 'قنوات مستوردة';

          let currentName = 'قناة بدون اسم';
          let currentGroupName = defaultFolderName;

          for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;
            
            if (line.startsWith('#EXTINF:')) {
              const groupMatch = line.match(/group-title="([^"]+)"/i) || line.match(/group-title=([^,]+)/i);
              if (groupMatch && groupMatch[1]) {
                currentGroupName = groupMatch[1].trim();
              } else {
                currentGroupName = defaultFolderName;
              }

              const parts = line.split(',');
              currentName = parts.length > 1 ? parts.slice(1).join(',').trim() : 'قناة بدون اسم';
            } else if (!line.startsWith('#')) {
              
              let folder = db.folders.find(f => f.name === currentGroupName);
              let folderId;
              if (folder) {
                folderId = folder.id;
              } else {
                folderId = '_' + Math.random().toString(36).substr(2, 9);
                db.folders.push({ id: folderId, name: currentGroupName, isOpen: false }); // المجلد المستورد مقفول افتراضياً
              }

              db.channels.push({
                id: '_' + Math.random().toString(36).substr(2, 9),
                name: currentName,
                url: line,
                folderId: folderId,
                isExternal: false
              });
              
              currentName = 'قناة بدون اسم'; 
              currentGroupName = defaultFolderName;
            }
          }
          saveDB(); renderList();
          alert('تم الاستيراد بنجاح بكل المجلدات!');
        };
        reader.readAsText(file);
        event.target.value = ''; 
      };

      // === كود حفظ صفحة الـ HTML بالكامل ===
      document.getElementById('btn-save-file').onclick = () => {
        const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "My_Player_Backup.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      };

      renderList();
    })();
  </script>
