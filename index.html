    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    /* المشغل الأساسي */
    iframe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; z-index: 1; }
    
    /* زرار الشاشة الكاملة */
    #fs-btn {
      position: fixed; top: 0; left: 0; z-index: 2147483647; width: 46px; height: 40px;
      background: #cc0000; border: none; border-right: 1px solid #222; border-radius: 0;
      color: #fff; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #fs-btn:hover { background: #ff1a1a; }
    #fs-btn svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }

    /* زرار إغلاق المشغل (X) */
    #close-player-btn {
      position: fixed; top: 0; left: 46px; z-index: 2147483647; width: 46px; height: 40px;
      background: #333; border: none; border-right: 1px solid #222; border-radius: 0;

      transition: background .15s;
      display: flex; align-items: center; justify-content: center;

    #close-player-btn:hover { background: #ff4c4c; color: #fff; }

    /* شريط السيرفرات والقائمة المتصل بالكامل */
    .aplr-menu {
      position: fixed; top: 0; right: 0; z-index: 2147483646;
      display: flex; gap: 0; list-style: none;
      background: #111; padding: 0; margin: 0;
      width: 100%; height: 40px;
      padding-left: 92px; /* مساحة عشان الزراير اللي على الشمال متتغطاش */
      overflow-x: auto; overflow-y: hidden;
      border-bottom: 1px solid #000;
    }
    .aplr-menu::-webkit-scrollbar { height: 0; display: none; } /* إخفاء شريط التمرير لشكل أنضف */
    .aplr-menu li { display: flex; align-items: stretch; height: 100%; }

    #menu-btn, .aplr-link {
      background: #4b197b; border: 1px solid #222; border-top: none; border-bottom: none; border-radius: 0;
      color: #fff; cursor: pointer; padding: 0 14px; height: 100%;
      font-size: 14px; font-weight: bold; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; white-space: nowrap;
    }
    #menu-btn { background: #333; font-size: 18px; padding: 0 14px; border-right: none; }
    .aplr-action.showrefresh .aplr-link { background: #333; } /* الريفرش رمادي زي الصورة */
    #menu-btn:hover, .aplr-action.showrefresh .aplr-link:hover { background: #444; }
    .aplr-link:hover { background: #5e2490; }
    .aplr-link.active { background: #cc0000; } /* الزرار النشط أحمر */
    .aplr-icon-refresh { width: 16px; height: 16px; fill: #fff; }

    /* القائمة الجانبية (Sidebar) */
    #sidebar {
      position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
      background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px);
      border-left: 1px solid #333; z-index: 2147483648;
      transition: right 0.3s ease-in-out; color: #fff;
      display: flex; flex-direction: column;
    }
    #sidebar.open { right: 0; }
    
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid #333;
      display: flex; justify-content: space-between; align-items: center;
    }
    .close-btn { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }
    .close-btn:hover { color: #fff; }

    .action-buttons { padding: 15px; display: flex; gap: 8px; border-bottom: 1px solid #333; flex-wrap: wrap; }
    .action-btn {
      flex: 1 1 calc(33% - 8px); min-width: 70px; padding: 8px 5px; background: #222; border: 1px solid #444;
      color: #fff; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-align: center;
    }
    .action-btn:hover { background: #e50914; border-color: #e50914; }

    /* قائمة القنوات والمجلدات */
    #content-list { flex: 1; overflow-y: auto; padding: 15px; }
    
    .folder { margin-bottom: 15px; background: #1a1a1a; border-radius: 6px; border: 1px solid #333; overflow: hidden; }
    .folder-header { 
      padding: 12px; background: #252525; cursor: pointer; font-weight: bold; 
      display: flex; justify-content: space-between; align-items: center; position: relative;
    }
    .folder-header:hover { background: #333; }
    .folder-channels { padding: 5px 0; display: none; }
    .folder.open .folder-channels { display: block; }
    
    .channel-item {
      padding: 10px 15px; cursor: pointer; font-size: 14px;
      border-bottom: 1px solid #222; transition: background 0.2s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      position: relative;
    }
    .channel-item:last-child { border-bottom: none; }
    .channel-item:hover { background: #333; color: #e50914; }
    .channel-item.active { border-right: 4px solid #e50914; background: #2a0000; }
    
    /* أزرار التعديل والحذف */
    .item-actions {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      display: none; gap: 10px;
    }
    .channel-item:hover .item-actions, .folder-header:hover .item-actions { display: flex; }
    .action-icon-btn { 
      background: transparent; border: none; cursor: pointer; font-size: 12px; font-weight: bold; padding: 2px 4px;
    }
    .action-icon-btn.delete-btn { color: #ff4c4c; }
    .action-icon-btn.edit-btn { color: #4caf50; }
    .action-icon-btn.delete-btn:hover { text-decoration: underline; }
    .action-icon-btn.edit-btn:hover { text-decoration: underline; }

    /* زرار الإضافة أسفل القائمة */
    .add-plus-btn {
      text-align: center; font-size: 24px; font-weight: bold; color: #fff; background: #222;
      margin-top: 10px; border-radius: 6px; border: 1px dashed #444; padding: 10px;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .add-plus-btn:hover { background: #333; border-color: #e50914; color: #e50914; }

    /* فورم الإضافة المنبثق */
    #add-modal {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2147483649; justify-content: center; align-items: center;
    }
    .modal-content { background: #222; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; border: 1px solid #444; }
    .modal-content h3 { margin-bottom: 15px; font-size: 16px; color: #fff; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 10px; margin-bottom: 15px; background: #111;
      border: 1px solid #444; color: #fff; border-radius: 4px;
    }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .save-btn { background: #e50914; color: #fff; }
    .cancel-btn { background: #555; color: #fff; }
  </style>

  <script>
    // 1. سكريبت الحماية القصوى لمنع الإعلانات والنوافذ المنبثقة والصفحات الخارجية نهائياً
    (function () {
      function _noop() { return null; }
      try { Object.defineProperty(window, "open", {value: _noop, writable: false, configurable: false}); } catch (e) { window.open = _noop; }
      try { window.open = _noop; } catch (e) {}
      try { document.defaultView.open = _noop; } catch (e) {}

      var windowCount = window.length;
      setInterval(function () {
        if (window.length > windowCount) {
          for (var i = windowCount; i < window.length; i++) { try { window[i].close(); } catch (e) {} }

        const reader = new FileReader();
        reader.onload = function(e) {
          const contents = e.target.result;
          const lines = contents.split('\n');
          
          const defaultFolderName = file.name.replace('.m3u8', '').replace('.m3u', '') || 'قنوات مستوردة';

          let currentName = 'قناة بدون اسم';
          let currentGroupName = defaultFolderName;

          for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;
            
            if (line.startsWith('#EXTINF:')) {
              const groupMatch = line.match(/group-title="([^"]+)"/i) || line.match(/group-title=([^,]+)/i);
              if (groupMatch && groupMatch[1]) {
                currentGroupName = groupMatch[1].trim();

        if (btn) btn.click();
        else {
            var p = document.getElementById('player');
            if (p) p.src = '';
        }
    }

    function toggleMobileRotation() {
        var doc = document.documentElement;
        var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        
        if (!isFullscreen) {
            var reqFS = doc.requestFullscreen || doc.webkitRequestFullscreen || doc.mozRequestFullScreen || doc.msRequestFullscreen;
            if (reqFS) {
                reqFS.call(doc).then(function() {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock("landscape").catch(function(e) { console.log(e); });
                    }
                }).catch(function(err) { console.log(err); });
            }
        } else {
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
            var exitFS = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
            if (exitFS) {
                exitFS.call(document);
            }
        }
    }

    function openExternal() {
        var url = currentPlayingUrl;
        if (url) window.open(url, '_blank');
        else alert('لا يوجد رابط مشغل حالياً!');
    }

    function toggleZenMode() {
        var menu = document.querySelector('.aplr-menu');
        var sidebar = document.getElementById('sidebar');
        if (menu && menu.style.display === 'none') {
            menu.style.display = 'flex';
        } else {
            if (menu) menu.style.display = 'none';
            if (sidebar) sidebar.classList.remove('open');
            alert('تم إخفاء الشرائط! قم بتحديث الصفحة (Refresh) لإعادتها.');
        }
    }

    function loadFromFirebase(force) {

    function saveToFirebase() {

    }

    function playStream(url, index) {
        var player = document.getElementById('player');
        if (player && url) {
            player.src = url;
            currentChannelIndex = index || 0;
        }
    }

    function playDirectLink() {
        var input = document.getElementById('direct-link-input');
        if (input && input.value) {
            playStream(input.value, 0);
        } else {
            alert('الرجاء إدخال رابط مباشر صحيح أولاً.');
        }
    }

    function nextChannel() {
        var links = Array.from(document.querySelectorAll('.channel-item, .aplr-link[role="button"]:not(#dashboard-btn)'));
        var currentIndex = links.findIndex(function(l) { return l.classList.contains('active'); });
        if (currentIndex !== -1) {
            links[currentIndex].classList.remove('active');
            var nextIndex = (currentIndex + 1) % links.length;
            links[nextIndex].click();
            links[nextIndex].classList.add('active');
        } else if (links.length > 0) {
            links[0].click();
            links[0].classList.add('active');
        }
    }

    function prevChannel() {
        var links = Array.from(document.querySelectorAll('.channel-item, .aplr-link[role="button"]:not(#dashboard-btn)'));
        var currentIndex = links.findIndex(function(l) { return l.classList.contains('active'); });
        if (currentIndex !== -1) {
            links[currentIndex].classList.remove('active');
            var prevIndex = (currentIndex - 1 + links.length) % links.length;
            links[prevIndex].click();
            links[prevIndex].classList.add('active');
        } else if (links.length > 0) {
            links[links.length - 1].click();
            links[links.length - 1].classList.add('active');
        }
    }

    var currentZoom = 1;
    function changeZoom(val) {
        currentZoom += val;
        var player = document.getElementById('player');
        if(player) {
            player.style.transform = 'scale(' + currentZoom + ')';
            player.style.transformOrigin = 'top left';
            player.style.width = (100 / currentZoom) + '%';
            player.style.height = (100 / currentZoom) + '%';
        }
    }

    var autoSwitchInterval = null;
    function toggleAutoSwitch() {
        var btn = document.getElementById('btn-auto-switch');
        var input = document.getElementById('auto-switch-sec');
        if (autoSwitchInterval) {
            clearInterval(autoSwitchInterval);
            autoSwitchInterval = null;
            if(btn) {
                btn.innerText = 'متوقف';
                btn.style.color = 'var(--warning)';
            }
        } else {
            var sec = input && input.value ? parseInt(input.value) : 10;
            autoSwitchInterval = setInterval(nextChannel, sec * 1000);
            if(btn) {
                btn.innerText = 'يعمل';
                btn.style.color = '#2ed573';
            }
        }
    }

    // دالة إضافة قنوات الشريط العلوي الشاملة والمطورة بالـ Regex لاستخراج الروابط وحفظها
    function addTopBarChannel() {
        var input = prompt("قم بلصق مجموعة الروابط هنا (سواء مفصولة بمسافة أو بسطر جديد):\nمثال:\nhttps://link1.com\nhttps://link2.com");
        if (!input) return;
        
        // استخراج جميع الروابط الصحيحة من النص المنسوخ تلقائياً
        var urls = input.match(/(https?:\/\/[^\s]+)/g);
        
        if (!urls || urls.length === 0) {
            alert("لم يتم العثور على روابط صحيحة في النص المنسوخ.");
            return;
        }

        urls.forEach(function(url) {
            var nextNum = window.db.topBarChannels.length + 1;
            window.db.topBarChannels.push({
                name: String(nextNum),
                url: url.trim()
            });
        });

        if (window.saveDB) window.saveDB();
        if (window.renderTopBar) window.renderTopBar();
    }

    function openPlayerFullscreen() {
        var player = document.getElementById('player');
        if (player) {
            if (player.requestFullscreen) {
                player.requestFullscreen();
            } else if (player.webkitRequestFullscreen) { /* Safari */
                player.webkitRequestFullscreen();
            } else if (player.msRequestFullscreen) { /* IE11 */
                player.msRequestFullscreen();
            } else if (player.mozRequestFullScreen) { /* Firefox */
                player.mozRequestFullScreen();
            }
        }
    }
